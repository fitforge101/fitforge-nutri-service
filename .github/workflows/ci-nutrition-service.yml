name: CI/CD - Nutrition Service

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  release:
    types: [created]

permissions:
  contents: read

jobs:

  # PR FLOW 
 
  sast:
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sast.yml@v2.0.0
    with:
      service-path: .
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}

  sca:
    needs: [sast]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sca.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .
      runtime: node
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy:
    needs: [sca]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-build.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .

  #  SINGLE PR CHECK
  pr-check:
    name: PR Quality Gate
    needs: [sast, sca, trivy]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"


  # DEVELOP (AFTER MERGE)


  dev-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/nutrition-service:dev-${{ github.sha }}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

  #  RELEASE (MAIN ONLY)

  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set release tag
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/nutrition-service:${{ github.event.release.tag_name }}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

  cd:
    needs: [publish]
    if: needs.publish.result == 'success'
    uses: fitforge101/fitforge-shared/.github/workflows/_cd-template.yml@feature/templates
    with:
      service-name: nutrition-service
      image-tag: ${{ github.event.release.tag_name }}
      environment: main
    secrets:
      HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
