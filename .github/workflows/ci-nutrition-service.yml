jobs:

  # ─── SAST ───
  sast:
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sast.yml@v2.0.0
    with:
      service-path: .
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}

  # ─── SCA ───
  sca:
    needs: [sast]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sca.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .
      runtime: node
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ─── BUILD (CI ONLY) ───
  build:
    if: github.event_name != 'release'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-build.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .


  #  DEV FLOW
  
  dev-publish:
    name: Build & Push Dev Image
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (commit SHA)
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/nutrition-service:dev-${{ github.sha }}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t $IMAGE .

      - name: Push Docker Image
        run: docker push $IMAGE

 
  # RELEASE FLOW

  publish:
    name: Build & Push (Release Only)
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract release tag
        id: meta
        run: |
          TAG=${{ github.event.release.tag_name }}
          IMAGE="${{ secrets.DOCKER_USERNAME }}/nutrition-service:$TAG"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Validate tag
        run: |
          if [ -z "${{ steps.meta.outputs.tag }}" ]; then
            echo "No release tag found"
            exit 1
          fi

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect ${{ steps.meta.outputs.image }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        if: steps.check.outputs.exists != 'true'
        run: docker build -t ${{ steps.meta.outputs.image }} .

      - name: Push Docker Image
        if: steps.check.outputs.exists != 'true'
        run: docker push ${{ steps.meta.outputs.image }}

  # ─── CD ───
  cd:
    name: Deploy via Helm (Release Only)
    needs: [publish]  
    if: needs.publish.result == 'success'
    uses: fitforge101/fitforge-shared/.github/workflows/_cd-template.yml@feature/templates
    with:
      service-name: nutrition-service
      image-tag: ${{ github.event.release.tag_name }}
      environment: production
    secrets:
      HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}