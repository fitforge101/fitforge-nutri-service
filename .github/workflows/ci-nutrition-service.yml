name: CI - Nutrition Service

on:
  push:
    branches: 
      - develop
      - main
  #   paths:
  #     - "services/nutrition-service/**"
  #     - ".github/workflows/ci-nutrition-service.yml"
  #     - ".github/workflows/_ci-template.yml"
  pull_request:
    branches:
      - develop
      - main
    # paths:
    #   - "services/nutrition-service/**"
    #   - ".github/workflows/ci-nutrition-service.yml"
    #   - ".github/workflows/_ci-template.yml"

# give the workflow permission to write to the repository contents
permissions:
  contents: write


jobs:
  ci:
    uses: fitforge101/fitforge-shared/.github/workflows/_ci-template.yml@feature/templates
    with:
      service-name: nutrition-service
      service-path: .
      runtime: node
      environment: ${{ github.ref_name }}
    secrets: inherit

