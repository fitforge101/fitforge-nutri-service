name: CI/CD - Nutrition Service

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: write

jobs:
  sast:
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sast.yml@v2.0.0 
    with:
      service-path: .
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}

  # ─── SCA (Snyk) ───
  sca:
    needs: [sast]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sca.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .
      runtime: python
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ─── Notify: Snyk Criticals ───
  notify-snyk:
    needs: [sca]
    if: needs.sca.outputs.critical-found == 'true'
    uses: fitforge101/fitforge-shared/.github/workflows/_notify.yml@v2.0.0
    with:
      subject: "🚨 Snyk: Critical Vulnerabilities in nutrition-service"
      body: "Critical/High vulnerabilities found in nutrition-service dependencies."
      service-name: nutrition-service
      artifact-name: snyk-report-nutrition-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

  # ─── Temp Docker Build + Trivy Scan ───
  build:
    needs: [sast, sca]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-build.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .

  # ─── Notify: Trivy Criticals ───
  notify-trivy:
    needs: [build]
    if: needs.build.outputs.trivy-critical == 'true'
    uses: fitforge101/fitforge-shared/.github/workflows/_notify.yml@v2.0.0
    with:
      subject: "🚨 Trivy: Critical Vulnerabilities in ai-service"
      body: "CRITICAL vulnerabilities found in ai-service Docker image."
      service-name: nutrition-service
      artifact-name: trivy-nutrition-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

  # ─── Publish Docker Image (Tag + Build + Push) ───
  publish:
    if: github.event_name == 'push'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-publish.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .
      environment: ${{ github.ref_name }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ─── Update Helm Chart (CD) ───
  # cd:
  #   needs: [publish]
  #   if: needs.publish.result == 'success'
  #   uses: fitforge101/fitforge-shared/.github/workflows/_cd-update.yml@main
  #   with:
  #     service-name: ai-service
  #     image-tag: ${{ needs.publish.outputs.image-tag }}
  #     environment: ${{ github.ref_name }}
  #   secrets:
  #     HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
