name: CI/CD - Nutrition Service

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: write

jobs:
  sast:
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sast.yml@v2.0.0 
    with:
      service-path: .
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}
  # ─── SCA (Snyk) ───
  sca:
    needs: [sast]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sca.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .
      runtime: node
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}






  # ─── Notify: Snyk Criticals ───
  notify-snyk:
    needs: [sca]
    if: needs.sca.outputs.critical-found == 'true'
    uses: fitforge101/fitforge-shared/.github/workflows/_notify.yml@v2.0.0
    with:
      subject: "🚨 Snyk: Critical Vulnerabilities in nutrition-service"
      body: "Critical/High vulnerabilities found in nutrition-service dependencies."
      service-name: nutrition-service
      artifact-name: snyk-report-nutrition-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

  # ─── Temp Docker Build + Trivy Scan ───
  build:
    needs: [sast, sca]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-build.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .

  # ─── Notify: Trivy Criticals ───
  notify-trivy:
    needs: [build]
    if: needs.build.outputs.trivy-critical == 'true'
    uses: fitforge101/fitforge-shared/.github/workflows/_notify.yml@v2.0.0
    with:
      subject: "🚨 Trivy: Critical Vulnerabilities in ai-service"
      body: "CRITICAL vulnerabilities found in ai-service Docker image."
      service-name: nutrition-service
      artifact-name: trivy-nutrition-service
    secrets:T
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

#DAST scan

  dast:
    name: DAST Scan (OWASP ZAP)
    if: github.event_name == 'pull_request' || github.ref_name == 'dast'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVICE_NAME: "nutri-service"
      DEFAULT_DAST_TARGET_URL: "http://fitforge360.in/"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Resolve DAST target
        id: resolve-target
        shell: bash
        run: |
          if [ -n "${{ vars.DAST_TARGET_URL }}" ]; then
            echo "target=${{ vars.DAST_TARGET_URL }}" >> "$GITHUB_OUTPUT"
            echo "Using DAST target from repository variable."
          else
            echo "target=${{ env.DEFAULT_DAST_TARGET_URL }}" >> "$GITHUB_OUTPUT"
            echo "DAST_TARGET_URL is not set. Falling back to ${{ env.DEFAULT_DAST_TARGET_URL }}."
          fi


      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ steps.resolve-target.outputs.target }}
          fail_action: ${{ github.ref_name != 'dast' }}
          cmd_options: >-
            -a -j -m 5 -T 60 -I
            -r zap-report.html
            -w zap-report.md
            -J zap-report.json


      - name: Normalize report site label
        if: always()
        shell: bash
        run: |
          if [ -f zap-report.html ]; then
            sed -i "s#Site:[[:space:]]*<a[^>]*>[^<]*</a>#Site: <a>${{ env.SERVICE_NAME }}</a>#g" zap-report.html || true
          fi
          if [ -f zap-report.md ]; then
            sed -i "s#${{ steps.resolve-target.outputs.target }}#${{ env.SERVICE_NAME }}#g" zap-report.md || true
          fi
          if [ -f zap-report.json ]; then
            sed -i "s#${{ steps.resolve-target.outputs.target }}#${{ env.SERVICE_NAME }}#g" zap-report.json || true
          fi


      - name: Upload DAST report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-report-nutri-service
          path: |
            zap-report.html
            zap-report.md
            zap-report.json
          if-no-files-found: warn

  # ─── Publish Docker Image (Tag + Build + Push) ───
  publish:
    if: github.event_name == 'push'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-publish.yml@v2.0.0
    with:
      service-name: nutrition-service
      service-path: .
      environment: ${{ github.ref_name }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

 # ─── Update Helm Chart (CD) ───
  cd:
    needs: [publish]
    if: needs.publish.result == 'success'
    uses: fitforge101/fitforge-shared/.github/workflows/_cd-template.yml@feature/templates
    with:
      service-name: nutrition-service
      image-tag: ${{ needs.publish.outputs.image-tag }}
      environment: ${{ github.ref_name }}
    secrets:
      HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
  ########


