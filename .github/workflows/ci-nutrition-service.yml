name: CI — Nutrition Service
on:
  push:
    branches: 
      - develop
      - main
      - feature/ci-nutrition-service
  pull_request:
    branches:
      - develop
      - main
      - feature/ci-nutrition-service
permissions:
  contents: write
jobs:
  ci:
    uses: fitforge101/fitforge-shared/.github/workflows/_ci-template.yml@feature/templates
    with:
      service-name: nutrition-service
      service-path: .
      runtime: node
      node-version: "20"
      environment: ${{ github.ref_name }}
    secrets: inherit

